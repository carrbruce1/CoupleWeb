<!DOCTYPE html>
<html lang="es">
  <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard ❤️</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  </head>

  <body class="bg-black text-white min-h-screen flex items-center justify-center">

    <div class="absolute inset-0 overflow-hidden">
      <div class="absolute w-[500px] h-[500px] bg-pink-500 blur-3xl opacity-30"></div>
    </div>

    <div class="relative w-full max-w-4xl p-6">

    <h2 id="bienvenida" class="text-center text-xl mb-6"></h2>

    <div class="grid md:grid-cols-2 gap-6">

    <!-- CREAR -->
    <div class="bg-white/10 p-6 rounded-3xl">
      <h3 class="mb-3">Tu código</h3>
      <button onclick="crearPareja()" class="bg-pink-500 px-4 py-2 rounded-xl w-full">
        Generar código
      </button>
      <p id="codigo" class="mt-3"></p>
    </div>

    <!-- UNIRSE -->
    <div class="bg-white/10 p-6 rounded-3xl">
        <h3 class="mb-3">Unirse</h3>
        <input id="codigoPareja" class="w-full mb-3 p-2 rounded-xl bg-black/30">
        <button onclick="unirse()" class="bg-purple-500 px-4 py-2 rounded-xl w-full">
          Unirse
        </button>
      </div>

    </div>

    <!-- PERFIL -->
    <div class="bg-white/10 p-6 rounded-3xl mt-6">
      <h3 class="mb-3">Tu perfil ❤️</h3>

      <input id="apodo" placeholder="Apodo"
      class="w-full mb-3 p-2 rounded-xl bg-black/30">

      <input type="date" id="fechaRelacion"
      class="w-full mb-3 p-2 rounded-xl bg-black/30">

      <button onclick="guardarPerfil()" class="bg-pink-500 px-4 py-2 rounded-xl w-full">
        Guardar
      </button>

    </div>

    </div>

    <script src="js/ui.js"></script>
    <script src="js/dashboard.js"></script>

  </body>
</html>
